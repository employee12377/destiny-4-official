<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DESTINY ONLINE</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* Background image */
#bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: zoom 25s infinite alternate ease-in-out;
  filter: brightness(0.7) contrast(1.2);
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Dark overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
}

/* Title */
.title {
  position: absolute;
  top: 15%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  letter-spacing: 10px;
}

.subtitle {
  font-size: 20px;
  letter-spacing: 5px;
  opacity: 0.7;
}

/* Menu */
.menu {
  position: absolute;
  bottom: 20%;
  width: 100%;
  text-align: center;
}

.button {
  display: inline-block;
  margin: 10px;
  padding: 15px 40px;
  border: 1px solid white;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  background: white;
  color: black;
}

/* Upload button (fixed visibility) */
.upload {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 5;
}

/* Particles */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.4;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<img id="bg" src="your-image.png">
<div class="overlay"></div>

<div class="title">
  DESTINY
  <div class="subtitle">ONLINE</div>
</div>

<div class="menu">
  <div class="button">PLAY</div>
  <div class="button">SETTINGS</div>
  <div class="button">EXIT</div>
</div>

<input type="file" id="upload" class="upload" accept="image/*">

<script>
const upload = document.getElementById("upload");
const bg = document.getElementById("bg");

upload.addEventListener("change", function () {
  const file = this.files[0];
  if (file) {
    bg.src = URL.createObjectURL(file);
  }
});

// particles
for (let i = 0; i < 80; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  p.style.opacity = Math.random();
  document.body.appendChild(p);
}
</script>

</body>
</html>
